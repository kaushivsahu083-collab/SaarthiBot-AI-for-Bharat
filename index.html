<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SaarthiBot</title>
<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1483.0.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat-container {
  width: 420px;
  height: 600px;
  background: #ffffff;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

.header {
  background: #1e3c72;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.message {
  margin-bottom: 10px;
  padding: 10px 14px;
  border-radius: 15px;
  max-width: 75%;
}

.bot {
  background: #f1f1f1;
}

.user {
  background: #2a5298;
  color: white;
  margin-left: auto;
}

.input-area {
  display: flex;
  padding: 10px;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
  outline: none;
}

button {
  margin-left: 8px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: #1e3c72;
  color: white;
}

.suggestions {
  padding: 8px;
  text-align: center;
}

.suggestions button {
  background: #ddd;
  color: black;
  margin: 4px;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="header">SaarthiBot 👋</div>

  <div class="messages" id="chat">
    <div class="message bot">
      Namaste 🙏 Main Saarthi hoon. Aapko kis seva ki jaankari chahiye?
    </div>
  </div>

  <div class="suggestions">
    <button onclick="quickSend('Mera bank balance kya hai')">Bank Balance</button>
    <button onclick="quickSend('Platform 2 kahan hai')">Platform 2</button>
    <button onclick="quickSend('OPD counter kahan hai')">Hospital OPD</button>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type your message...">
    <button onclick="startVoice()">🎤</button>
    <button onclick="handleSend()">Send</button>
  </div>
</div>

<script>
AWS.config.region = "ap-southeast-1";

AWS.config.credentials = new AWS.CognitoIdentityCredentials({
  IdentityPoolId: "ap-southeast-1:329e6829-824d-4ac9-8fa2-d7f3ec761a5a"
});

const lexruntime = new AWS.LexRuntimeV2();

function addMessage(text, sender) {
  const chat = document.getElementById("chat");
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

async function sendToLex(message) {
  const params = {
    botId: "D8UVP7Z4AV",
    botAliasId: "TSTALIASID",
    localeId: "en_IN",
    sessionId: "user-session",
    text: message
  };

  try {
    await AWS.config.credentials.getPromise();
    const response = await lexruntime.recognizeText(params).promise();
    return response.messages[0].content;
  } catch (err) {
    console.error(err);
    return "Server error occurred.";
  }
}

async function handleSend() {
  const input = document.getElementById("userInput").value;
  if (!input) return;

  addMessage(input, "user");
  document.getElementById("userInput").value = "";

  addMessage("Typing...", "bot");

  const reply = await sendToLex(input);

  document.getElementById("chat").lastChild.remove();
  addMessage(reply, "bot");
}

function quickSend(text) {
  document.getElementById("userInput").value = text;
  handleSend();
}

function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-IN";
  recognition.start();

  recognition.onresult = function(event) {
    document.getElementById("userInput").value = event.results[0][0].transcript;
    handleSend();
  };
}
</script>

</body>
</html>
