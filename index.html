<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SaarthiBot - AI for Bharat</title>
<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1483.0.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat-container {
  width: 430px;
  height: 650px;
  background: #ffffff;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

.header {
  background: #0f2027;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  font-size: 16px;
  font-weight: bold;
}

.badge {
  background: #ff9933;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 10px;
  margin-left: 6px;
}

.header-buttons button {
  background: white;
  color: #0f2027;
  border: none;
  padding: 4px 8px;
  border-radius: 10px;
  font-size: 11px;
  cursor: pointer;
  margin-left: 5px;
}

.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  background: #f4f6fb;
}

.message {
  margin-bottom: 10px;
  padding: 10px 14px;
  border-radius: 15px;
  max-width: 75%;
  font-size: 14px;
}

.bot {
  background: #e4e6eb;
}

.user {
  background: #2c5364;
  color: white;
  margin-left: auto;
}

.typing {
  font-style: italic;
  color: gray;
}

.suggestions {
  padding: 6px;
  text-align: center;
}

.suggestions button {
  background: #dde3ec;
  border: none;
  border-radius: 15px;
  padding: 5px 10px;
  margin: 4px;
  font-size: 11px;
  cursor: pointer;
}

.input-area {
  display: flex;
  padding: 8px;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 8px;
  border-radius: 20px;
  border: 1px solid #ccc;
  outline: none;
}

button.send-btn {
  margin-left: 6px;
  padding: 8px 12px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: #0f2027;
  color: white;
}

.footer {
  text-align: center;
  font-size: 10px;
  padding: 6px;
  background: #f0f2f5;
  color: #666;
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="header">
    <div class="header-left">
      SaarthiBot
      <span class="badge">AI for Bharat</span>
    </div>
    <div class="header-buttons">
      <button onclick="toggleLanguage()">Lang</button>
      <button onclick="resetChat()">Reset</button>
    </div>
  </div>

  <div class="messages" id="chat">
    <div class="message bot" id="welcomeMsg">
      Namaste 🙏 Main Saarthi hoon. Aapko kis seva ki jaankari chahiye?
    </div>
  </div>

  <div class="suggestions">
    <button onclick="quickSend('Mera bank balance kya hai')">🏦 Bank</button>
    <button onclick="quickSend('Platform 2 kahan hai')">🚆 Railway</button>
    <button onclick="quickSend('OPD counter kahan hai')">🏥 Hospital</button>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type your message...">
    <button onclick="startVoice()">🎤</button>
    <button class="send-btn" onclick="handleSend()">Send</button>
  </div>

  <div class="footer">
    Powered by AWS Lex • Lambda • Cognito • Amplify
  </div>

</div>

<script>
AWS.config.region = "ap-southeast-1";

AWS.config.credentials = new AWS.CognitoIdentityCredentials({
  IdentityPoolId: "ap-southeast-1:329e6829-824d-4ac9-8fa2-d7f3ec761a5a"
});

const lexruntime = new AWS.LexRuntimeV2();
let sessionId = crypto.randomUUID();
let isHindi = true;

function addMessage(text, sender, className="") {
  const chat = document.getElementById("chat");
  const msg = document.createElement("div");
  msg.className = "message " + sender + " " + className;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

async function sendToLex(message) {
  const params = {
    botId: "D8UVP7Z4AV",
    botAliasId: "TSTALIASID",
    localeId: "en_IN",
    sessionId: sessionId,
    text: message
  };
  await AWS.config.credentials.getPromise();
  const response = await lexruntime.recognizeText(params).promise();
  return response.messages[0].content;
}

async function handleSend() {
  const input = document.getElementById("userInput").value;
  if (!input) return;

  addMessage(input, "user");
  document.getElementById("userInput").value = "";

  const typingMsg = document.createElement("div");
  typingMsg.className = "message bot typing";
  typingMsg.innerText = "Typing...";
  document.getElementById("chat").appendChild(typingMsg);

  const reply = await sendToLex(input);
  typingMsg.remove();

  addMessage(reply, "bot");
}

function quickSend(text) {
  document.getElementById("userInput").value = text;
  handleSend();
}

function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-IN";
  recognition.start();
  recognition.onresult = function(event) {
    document.getElementById("userInput").value = event.results[0][0].transcript;
    handleSend();
  };
}

function resetChat() {
  sessionId = crypto.randomUUID();
  document.getElementById("chat").innerHTML = `
    <div class="message bot">
      Namaste 🙏 Main Saarthi hoon. Aapko kis seva ki jaankari chahiye?
    </div>
  `;
}

function toggleLanguage() {
  isHindi = !isHindi;
  document.getElementById("welcomeMsg").innerText =
    isHindi
    ? "Namaste 🙏 Main Saarthi hoon. Aapko kis seva ki jaankari chahiye?"
    : "Hello 👋 I am Saarthi. How can I assist you today?";
}
</script>

</body>
</html>
