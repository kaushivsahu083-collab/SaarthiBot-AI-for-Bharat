<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SaarthiBot - AI for Bharat</title>
<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1483.0.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;

  background:
    radial-gradient(circle at center, rgba(0,0,128,0.08) 0%, transparent 40%),
    linear-gradient(
      to bottom,
      #FF9933 0%,
      #FF9933 33%,
      #FFFFFF 33%,
      #FFFFFF 66%,
      #138808 66%,
      #138808 100%
    );

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.top-strip {
  position: absolute;
  top: 0;
  width: 100%;
  text-align: center;
  padding: 8px;
  font-size: 13px;
  background: linear-gradient(to right,#f4f8ff,#eaf2ff);
  color: #1a1a1a;
  font-weight: 500;
  border-bottom: 1px solid #dbe6ff;
}

.chat-container {
  width: 430px;
  height: 650px;
  background: #ffffff;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  border: 2px solid rgba(0,0,0,0.1);
  margin-top: 40px;
}

.header {
  background: #0f2027;
  color: white;
  padding: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  font-size: 16px;
  font-weight: bold;
}

.badge {
  background: #ff9933;
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 10px;
  margin-left: 6px;
}

.header-buttons button {
  background: white;
  color: #0f2027;
  border: none;
  padding: 4px 8px;
  border-radius: 10px;
  font-size: 11px;
  cursor: pointer;
  margin-left: 5px;
}

.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  background: #f4f6fb;
}

.message {
  margin-bottom: 10px;
  padding: 10px 14px;
  border-radius: 15px;
  max-width: 75%;
  font-size: 14px;
}

.bot {
  background: #e4e6eb;
}

.user {
  background: #2c5364;
  color: white;
  margin-left: auto;
}

.typing {
  font-style: italic;
  color: gray;
}

.suggestions {
  padding: 6px;
  text-align: center;
}

.suggestions button {
  background: #dde3ec;
  border: none;
  border-radius: 15px;
  padding: 5px 10px;
  margin: 4px;
  font-size: 11px;
  cursor: pointer;
}

.input-area {
  display: flex;
  padding: 8px;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 8px;
  border-radius: 20px;
  border: 1px solid #ccc;
  outline: none;
}

button.send-btn {
  margin-left: 6px;
  padding: 8px 12px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: #0f2027;
  color: white;
}

.footer {
  text-align: center;
  font-size: 11px;
  padding: 8px;
  background: #f0f2f5;
  color: #555;
}
</style>
</head>

<body>

<div class="top-strip">
Voice-first AI Public Service Assistant for Bharat 🇮🇳 |
Powered by AWS Bedrock • Hybrid AI Architecture • Retrieval Grounded
</div>

<div class="chat-container">

<div class="header">
<div class="header-left">
SaarthiBot
<span class="badge">AI for Bharat</span>
</div>
<div class="header-buttons">
<button onclick="toggleLanguage()">Lang</button>
<button onclick="resetChat()">Reset</button>
</div>
</div>

<div class="messages" id="chat">
<div class="message bot" id="welcomeMsg">
Namaste 🙏 Main Saarthi hoon. Aapko kis seva ki jaankari chahiye?
</div>
</div>

<div class="suggestions">
<button onclick="quickSend('Mera bank balance kya hai')">🏦 Bank</button>
<button onclick="quickSend('Platform 2 kahan hai')">🚆 Railway</button>
<button onclick="quickSend('OPD counter kahan hai')">🏥 Hospital</button>
</div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Type your message...">
<button onclick="startVoice()">🎤</button>
<button class="send-btn" onclick="handleSend()">Send</button>
</div>

<div class="footer">
Built on Amazon Lex • AWS Lambda • Amazon Bedrock • DynamoDB • Amplify
</div>

</div>

<script>

AWS.config.region = "ap-southeast-1";

AWS.config.credentials = new AWS.CognitoIdentityCredentials({
IdentityPoolId: "ap-southeast-1:329e6829-824d-4ac9-8fa2-d7f3ec761a5a"
});

const lexruntime = new AWS.LexRuntimeV2();
let sessionId = crypto.randomUUID();
let isHindi = true;

function addMessage(text, sender) {

const chat = document.getElementById("chat");

const msg = document.createElement("div");

msg.className = "message " + sender;

msg.innerText = text;

chat.appendChild(msg);

chat.scrollTop = chat.scrollHeight;

}

function speakText(text){

window.speechSynthesis.cancel();

const speech = new SpeechSynthesisUtterance(text);

speech.lang="hi-IN";

speech.rate=1;

speech.pitch=1;

window.speechSynthesis.speak(speech);

}

function getConfidence(reply){

const r=reply.toLowerCase();

if(r.includes("platform")||r.includes("opd")||r.includes("counter"))
return "High (Deterministic Routing)";

if(r.includes("digital india")||r.includes("rashtrapati"))
return "Medium (Retrieval Grounded Response)";

return "AI Generated (Bedrock Model)";

}

async function sendToLex(message){

const params={
botId:"D8UVP7Z4AV",
botAliasId:"TSTALIASID",
localeId:"en_IN",
sessionId:sessionId,
text:message
};

await AWS.config.credentials.getPromise();

const response=await lexruntime.recognizeText(params).promise();

return response.messages?.[0]?.content || "Mujhe samajh nahi aaya.";

}

async function handleSend(){

const input=document.getElementById("userInput").value;

if(!input) return;

addMessage(input,"user");

document.getElementById("userInput").value="";

const typingMsg=document.createElement("div");

typingMsg.className="message bot typing";

typingMsg.innerText="Typing...";

document.getElementById("chat").appendChild(typingMsg);

const reply=await sendToLex(input);

typingMsg.remove();

addMessage(reply,"bot");

speakText(reply);

const confidence=getConfidence(reply);

addMessage("🧠 Confidence: "+confidence,"bot");

}

function quickSend(text){

document.getElementById("userInput").value=text;

handleSend();

}

function startVoice(){

const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();

recognition.lang="en-IN";

recognition.start();

recognition.onresult=function(event){

document.getElementById("userInput").value=event.results[0][0].transcript;

handleSend();

};

}

function resetChat(){

sessionId=crypto.randomUUID();

document.getElementById("chat").innerHTML=`
<div class="message bot">
Namaste 🙏 Main Saarthi hoon. Aapko kis seva ki jaankari chahiye?
</div>
`;

}

function toggleLanguage(){

isHindi=!isHindi;

document.getElementById("welcomeMsg").innerText=
isHindi
?"Namaste 🙏 Main Saarthi hoon. Aapko kis seva ki jaankari chahiye?"
:"Hello 👋 I am Saarthi. How can I assist you today?";

}

</script>

</body>
</html>
