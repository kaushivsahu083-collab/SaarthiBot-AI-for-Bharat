<!DOCTYPE html>
<html>
<head>
    <title>SaarthiBot - AI Public Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 95%;
            max-width: 500px;
            height: 90vh;
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0px 10px 40px rgba(0,0,0,0.3);
        }

        .chat-header {
            background: #1e3c72;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f5f7fb;
        }

        .message {
            margin: 8px 0;
            padding: 10px 14px;
            border-radius: 15px;
            max-width: 80%;
            animation: fadeIn 0.3s ease-in;
        }

        .user {
            background: #2a5298;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .bot {
            background: #e4e6eb;
            color: black;
            border-bottom-left-radius: 5px;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            background: white;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
        }

        .chat-input button {
            margin-left: 8px;
            padding: 10px 14px;
            border-radius: 50%;
            border: none;
            background: #1e3c72;
            color: white;
            cursor: pointer;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            padding: 8px;
            gap: 6px;
        }

        .suggestions button {
            background: #e4e6eb;
            border: none;
            border-radius: 15px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
        SaarthiBot 🤖
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">Namaste 🙏 Main Saarthi hoon. Aapko kis seva ki jaankari chahiye?</div>
    </div>

    <div class="suggestions">
        <button onclick="quickMessage('Mera bank balance kya hai')">Bank Balance</button>
        <button onclick="quickMessage('OPD kahan hai')">Hospital OPD</button>
        <button onclick="quickMessage('Platform 2 ka raasta')">Platform 2</button>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Apna prashn likhiye...">
        <button onclick="startVoice()">🎤</button>
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");

    function appendMessage(text, sender) {
        const msg = document.createElement("div");
        msg.classList.add("message", sender);
        msg.innerText = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, "user");
        input.value = "";

        setTimeout(() => {
            appendMessage("Processing...", "bot");
        }, 500);
    }

    function quickMessage(text) {
        document.getElementById("userInput").value = text;
        sendMessage();
    }

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = "hi-IN";
        recognition.start();

        recognition.onresult = function(event) {
            document.getElementById("userInput").value = event.results[0][0].transcript;
            sendMessage();
        };
    }
</script>

</body>
</html>
